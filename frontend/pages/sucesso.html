<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy" content="upgrade-insecure-requests" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='10' fill='%235fbe4a'/%3E%3Cpath d='M14 34h36v8H14zM14 22h36v8H14z' fill='white'/%3E%3C/svg%3E" />
  <title>Envio realizado</title>
  <link rel="stylesheet" href="../styles/styles.css" />
</head>
<body>
  <header class="top-header">
    <div class="container header-content">
      <img src="../assets/logo-normatel.png" alt="Normatel Engenharia" class="logo-normatel" />
    </div>
  </header>

  <main class="container success-wrapper">
    <section class="card success-card" aria-live="polite">
      <div class="success-icon" aria-hidden="true">✓</div>
      <h1>Enviado com sucesso</h1>
      <p class="page-subtitle">Seu formulário foi recebido pelo RH.</p>
      <div id="confirmationDetails" class="confirmation-details hidden">
        <p><strong>ID de Rastreamento:</strong> <span id="trackingId"></span></p>
        <p><strong>Data e Hora:</strong> <span id="submissionTime"></span></p>
        <p><strong>Email:</strong> <span id="userEmail"></span></p>
        <p id="receiptLink" class="hidden"><a id="receiptUrl" href="#" target="_blank">Baixar Comprovante PDF</a></p>
      </div>
      <a href="index.html" class="success-link">Fazer novo envio</a>
    </section>
  </main>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const data = sessionStorage.getItem('envio_success_data');
      if (data) {
        const parsed = JSON.parse(data);
        document.getElementById('trackingId').textContent = parsed.tracking_id;
        document.getElementById('submissionTime').textContent = new Date(parsed.criado_em).toLocaleString('pt-BR');
        document.getElementById('userEmail').textContent = parsed.email;
        if (parsed.comprovante_url) {
          document.getElementById('receiptUrl').href = parsed.comprovante_url;
          document.getElementById('receiptLink').classList.remove('hidden');
        }
        document.getElementById('confirmationDetails').classList.remove('hidden');
        sessionStorage.removeItem('envio_success_data');
      }
    });
  </script>
</body>
</html>
